<!DOCTYPE html>

<html lang="zh-Hant">

<title>大智度論 · 卷六十四 · 第一至第四品彙整</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&amp;family=Noto+Sans+TC:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f7f3ec; --text:#2c2416; --text2:#5a4e3a; --text-muted:#6B5B4B;
  --accent:#8b5e3c; --accentL:#c4956a; --accent-red:#8B2500;
  --gold:#b8860b; --goldL:#d4a84b; --gold-light:#C9A84C;
  --border:#d4c4a8; --border-light:#EDE8E0; --card:#fffdf7;
  --verseBg:#f0e8d8; --verseBd:#c4956a;
  --sbW:76px; --sbBg:#1e1a14; --sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px; --shadow:rgba(91,58,41,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  scrollbar-width:none;-ms-overflow-style:none;
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
  -webkit-touch-callout:none;
}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none!important;width:0!important;height:0!important;}
body{
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  background:var(--bg);color:var(--text);
  font-size:20px;line-height:1.85;
}
a{color:inherit;text-decoration:none;}
img{max-width:100%;-webkit-user-drag:none;pointer-events:none;}
#top{position:absolute;top:0;left:0;width:1px;height:1px;overflow:hidden;}

/* ===== Sidebar ===== */
#sb{
  position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;
}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{
  position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;letter-spacing:2px;
  color:var(--gold);text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;display:block;
  transition:color .25s,background .25s;
  border-bottom:1px solid rgba(184,134,11,.25);
}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;padding:6px 0;}
.sb-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:5px 4px;width:100%;text-decoration:none;color:var(--sbText);
  cursor:pointer;transition:all .25s;
}
.sb-item:hover{color:#fff;}
.sb-circle{
  width:36px;height:36px;border-radius:50%;
  background:rgba(212,196,168,.08);
  border:1.5px solid rgba(184,134,11,.4);
  display:flex;align-items:center;justify-content:center;
  font-family:"Noto Sans TC",sans-serif;font-size:15px;font-weight:600;
  color:var(--gold);transition:all .3s;
}
.sb-label{
  font-family:"Noto Sans TC",sans-serif;font-size:11px;letter-spacing:.5px;
  text-align:center;line-height:1.25;color:rgba(212,196,168,.78);
  max-width:64px;
}
.sb-item.active .sb-circle{
  background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#fff;border-color:var(--goldL);
  box-shadow:0 0 14px rgba(212,168,75,.55);
}
.sb-item.active .sb-label{color:#fff;}

/* Sidebar toggle (mobile) */
#sbToggle{
  display:none;position:fixed;top:14px;left:14px;z-index:110;
  width:42px;height:42px;border-radius:50%;background:var(--sbBg);
  color:var(--gold);border:1px solid var(--gold);
  font-size:20px;cursor:pointer;
}

/* ===== Main ===== */
.main{margin-left:var(--sbW);min-height:100vh;}

/* ===== Hero ===== */
.site-hero{
  position:relative;overflow:hidden;
  background:var(--headGrad);color:#fff;
  padding:96px 24px 84px;text-align:center;
  border-bottom:3px solid var(--gold);
}
.site-hero::before{
  content:"般 若";position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:380px;color:rgba(212,196,168,.04);
  font-weight:900;letter-spacing:30px;
  pointer-events:none;white-space:nowrap;
}
.hero-content{position:relative;z-index:1;max-width:920px;margin:0 auto;}
.hero-meta{
  font-family:"Noto Sans TC",sans-serif;font-size:13px;
  letter-spacing:7px;color:var(--goldL);
  margin-bottom:24px;text-transform:uppercase;
}
.hero-title{
  font-size:56px;font-weight:900;letter-spacing:8px;
  color:#fff;margin-bottom:10px;line-height:1.25;
}
.hero-title-2{
  font-size:42px;font-weight:700;letter-spacing:14px;
  color:var(--goldL);margin-bottom:20px;line-height:1.2;
}
.hero-subtitle{
  font-size:20px;font-weight:400;letter-spacing:5px;
  color:#fff;opacity:.92;margin-bottom:18px;
}
.hero-author{
  font-family:"Noto Sans TC",sans-serif;font-size:14px;
  letter-spacing:3px;color:rgba(212,196,168,.78);
  line-height:2;
}
.hero-range{
  margin-top:24px;display:inline-block;
  font-family:"Noto Sans TC",sans-serif;font-size:13px;letter-spacing:3px;
  color:var(--gold);background:rgba(212,196,168,.08);
  padding:9px 24px;border-radius:24px;
  border:1px solid rgba(184,134,11,.4);
}

/* ===== Preface ===== */
.preface{max-width:920px;margin:48px auto 12px;padding:0 28px;}
.preface-title{
  text-align:center;font-size:30px;color:var(--accent);
  margin-bottom:22px;letter-spacing:5px;font-weight:700;
  position:relative;padding-bottom:14px;
}
.preface-title::after{
  content:"";position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:62px;height:3px;background:linear-gradient(90deg,var(--gold),var(--goldL));
}
.preface p{
  font-size:19px;line-height:2.1;color:var(--text2);
  margin-bottom:16px;text-align:justify;text-indent:2em;
}
.preface p strong,.preface p b{color:var(--accent-red);font-weight:700;}

/* ===== Outer TOC（總目錄）===== */
.toc-section{
  max-width:1100px;margin:48px auto 56px;padding:36px 28px;
  background:var(--card);border-radius:16px;border:1px solid var(--border);
  box-shadow:0 4px 22px rgba(91,58,41,.08);
}
.toc-title{
  text-align:center;font-size:34px;color:var(--accent);
  margin-bottom:8px;letter-spacing:8px;font-weight:700;
}
.toc-desc{
  text-align:center;font-family:"Noto Sans TC",sans-serif;
  font-size:14px;color:var(--text-muted);letter-spacing:3px;
  margin-bottom:32px;
}
.toc-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:14px;
}
.toc-card{
  display:flex;align-items:flex-start;gap:14px;
  padding:18px 22px;background:#fffdf5;
  border:1px solid var(--border);border-radius:10px;
  text-decoration:none;color:var(--text);
  transition:all .3s;cursor:pointer;
}
.toc-card:hover{
  border-color:var(--gold);background:#fff;
  transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(184,134,11,.16);
}
.toc-num{
  flex-shrink:0;width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:"Noto Sans TC",sans-serif;font-size:17px;font-weight:700;
  box-shadow:0 2px 6px rgba(184,134,11,.32);
}
.toc-name{
  font-size:19.5px;line-height:1.7;color:var(--text);
  font-weight:600;letter-spacing:1px;
}
.toc-name small{
  display:block;font-size:13.5px;font-weight:400;
  color:var(--text-muted);letter-spacing:1.5px;margin-top:4px;
  font-family:"Noto Sans TC",sans-serif;
}

/* ===== Chapter ===== */
.chapter{margin-bottom:30px;scroll-margin-top:20px;}
.ch-head{
  background:var(--headGrad);color:#fff;
  padding:54px 28px 44px;text-align:center;
  position:relative;border-top:1px solid var(--gold);
  border-bottom:1px solid var(--gold);
}
.ch-head::after{
  content:"";position:absolute;bottom:14px;left:50%;
  transform:translateX(-50%);
  width:88px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.ch-num{
  font-family:"Noto Sans TC",sans-serif;font-size:18px;
  letter-spacing:6px;color:var(--gold);margin-bottom:14px;
}
.ch-name{
  font-size:34px;color:#fff;letter-spacing:6px;font-weight:700;
  margin-bottom:14px;line-height:1.35;
}
.ch-sub{
  font-family:"Noto Sans TC",sans-serif;font-size:17px;
  letter-spacing:3px;color:rgba(212,196,168,.85);
}
.ch-body{
  max-width:1180px;margin:28px auto 0;padding:0 18px;
}

/* ===== Bridge（前後文邏輯）===== */
.bridge{
  background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);
  border-left:5px solid var(--gold);
  border-radius:10px;
  padding:20px 26px;margin:0 0 22px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);
}
.bridge-outro{
  border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:14px;
}
.bridge-label{
  display:inline-block;
  font-family:"Noto Sans TC",sans-serif;font-size:12.5px;
  background:var(--gold);color:#fff;
  padding:4px 14px;border-radius:13px;
  letter-spacing:2.2px;margin-bottom:12px;font-weight:600;
}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;text-align:justify;}
.bridge p strong{color:var(--accent-red);font-weight:700;}

/* ===== iframe ===== */
.ch-frame{
  display:block;width:100%;border:0;
  background:#fffdf7;
  border:1px solid var(--border);
  border-radius:12px;
  box-shadow:0 4px 20px rgba(91,58,41,.1);
  margin:0 0 8px;
  min-height:180px;
}

/* ===== Read progress ===== */
.read-progress{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;
  font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;
  backdrop-filter:blur(6px);
  transition:opacity .45s ease, transform .45s ease;
}
.read-progress.hide-near-end{
  opacity:0;
  transform:translateX(-50%) translateY(28px);
}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:42px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}

/* ===== Back to top ===== */
#backTop{
  position:fixed;right:18px;bottom:80px;
  width:44px;height:44px;border-radius:50%;
  background:var(--accent);color:#fff;border:0;
  font-size:20px;cursor:pointer;display:none;
  box-shadow:0 4px 14px rgba(91,58,41,.3);
  z-index:115;
}
#backTop.show{display:block;}

/* ===== Footer ===== */
.site-footer{
  background:var(--sbBg);color:var(--sbText);
  text-align:center;padding:38px 24px;margin-top:50px;
  border-top:2px solid var(--gold);
}
.site-footer p{font-size:15px;letter-spacing:3px;line-height:2;margin:0;}

/* ===== Responsive ===== */
@media (max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.show{transform:translateX(0);}
  #sbToggle{display:flex;align-items:center;justify-content:center;}
  .main{margin-left:0;}
  .hero-title{font-size:42px;letter-spacing:5px;}
  .hero-title-2{font-size:30px;letter-spacing:8px;}
}
@media (max-width:600px){
  body{font-size:18px;}
  .hero-title{font-size:34px;}
  .ch-name{font-size:26px;letter-spacing:3px;}
  .preface{padding:0 18px;}
  .toc-section{margin:32px 12px;padding:24px 16px;}
}
</style>

<script>
/* ============ Sidebar toggle ============ */
var sb = document.getElementById('sb');
var sbToggle = document.getElementById('sbToggle');
if(sbToggle){
  sbToggle.addEventListener('click',function(){ sb.classList.toggle('show'); });
}
/* ============ sb-brand 點擊回頂 ============ */
var sbBrand = document.getElementById('sbBrand');
if(sbBrand){
  sbBrand.addEventListener('click', function(e){
    e.preventDefault();
    window.scrollTo({top:0, behavior:'smooth'});
  });
}
/* ============ Back to top ============ */
var backTop = document.getElementById('backTop');
window.addEventListener('scroll', function(){
  if(window.scrollY > 600){ backTop.classList.add('show'); }
  else { backTop.classList.remove('show'); }
}, {passive:true});
backTop.addEventListener('click', function(){
  window.scrollTo({top:0, behavior:'smooth'});
});

/* ============ iframe 自動高度（解耦 viewport / content）============ */
function resizeFrame(f){
  try{
    var d = f.contentDocument || f.contentWindow.document;
    if(!d || !d.body) return;
    d.body.style.minHeight = '0';
    d.body.style.height    = 'auto';
    if(d.documentElement){
      d.documentElement.style.minHeight = '0';
      d.documentElement.style.height    = 'auto';
    }
    var h = d.body.scrollHeight;
    if(h > 100){
      f.style.height    = h + 'px';
      f.style.minHeight = '0';
    }
  }catch(e){}
}
function resizeAllFrames(){
  document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function') updateProgress();
}
function setupFrame(f){
  var tries = 0;
  function tick(){
    tries++;
    resizeFrame(f);
    if(tries < 30) setTimeout(tick, 200);
  }
  if(f.contentDocument && f.contentDocument.readyState === 'complete'){
    tick();
  } else {
    f.addEventListener('load', tick);
  }
}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;
window.addEventListener('resize', function(){
  clearTimeout(rzT);
  rzT = setTimeout(resizeAllFrames, 200);
});

/* ============ 錨點點擊（外層 sb / TOC → chapter）============ */
document.addEventListener('click', function(e){
  var a = e.target;
  while(a && a.tagName !== 'A') a = a.parentElement;
  if(!a) return;
  var h = a.getAttribute('href');
  if(!h || h.charAt(0) !== '#' || h.length < 2) return;
  var id = h.substring(1);
  var el = document.getElementById(id);
  if(!el) return;
  e.preventDefault();
  resizeAllFrames();
  setTimeout(function(){
    resizeAllFrames();
    var rect = el.getBoundingClientRect();
    var y = window.scrollY + rect.top - 20;
    window.scrollTo({top:y, behavior:'smooth'});
  }, 60);
}, true);

/* ============ Read progress ============ */
var rpFill = document.getElementById('rpFill');
var rpPct  = document.getElementById('rpPct');
function updateProgress(){
  var sh = document.documentElement.scrollHeight - window.innerHeight;
  var pct = sh > 0 ? Math.min(100, Math.max(0, window.scrollY / sh * 100)) : 0;
  if(rpFill) rpFill.style.width = pct + '%';
  if(rpPct)  rpPct.textContent  = Math.round(pct) + '%';
}
window.addEventListener('scroll', updateProgress, {passive:true});
updateProgress();

/* ============ 接近頁尾自動淡出（避免擋住迴向偈） ============ */
(function(){
  var cap = document.getElementById('readProgress');
  if(!cap) return;
  function setHide(on){ cap.classList.toggle('hide-near-end', !!on); }
  var targets = [];
  var f1 = document.querySelector('[data-wy-notice="v2"]');
  if(f1) targets.push(f1);
  var f2 = document.querySelector('.site-footer');
  if(f2) targets.push(f2);
  if(!targets.length) return;
  if('IntersectionObserver' in window){
    var io = new IntersectionObserver(function(entries){
      var any = entries.some(function(e){ return e.isIntersecting; });
      setHide(any);
    }, {root:null, rootMargin:'0px 0px -20px 0px', threshold:0.01});
    targets.forEach(function(t){ io.observe(t); });
  } else {
    var check = function(){
      var dh = document.documentElement.scrollHeight;
      var sb = window.scrollY + window.innerHeight;
      setHide(dh - sb < 240);
    };
    window.addEventListener('scroll', check, {passive:true});
    check();
  }
})();

/* ============ Sidebar active ============ */
var chapters = Array.from(document.querySelectorAll('.chapter'));
var sbItems  = Array.from(document.querySelectorAll('.sb-item'));
function syncActive(){
  var line = window.innerHeight * 0.35;
  var activeIdx = 0;
  for(var i=0; i<chapters.length; i++){
    var top = chapters[i].getBoundingClientRect().top;
    if(top < line) activeIdx = i;
  }
  sbItems.forEach(function(it,idx){
    if(idx === activeIdx) it.classList.add('active');
    else it.classList.remove('active');
  });
}
window.addEventListener('scroll', syncActive, {passive:true});
syncActive();

/* ============ 防複製 ============ */
['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
  document.addEventListener(ev,function(e){e.preventDefault();return false;},true);
});
document.addEventListener('keydown',function(e){
  var k=e.key;
  if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){e.preventDefault();}
  if(k==='F12')e.preventDefault();
  if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K'))e.preventDefault();
},true);

/* ============ 持續輪詢 15 秒，確保字型/圖片載入後 reflow 同步 ============ */
var _rt=0, _riv=setInterval(function(){
  _rt++; resizeAllFrames();
  if(_rt > 50) clearInterval(_riv);
}, 300);
</script>

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-64-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
