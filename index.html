<style>
:root{
  --bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
  --accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;
  --gold:#b8860b;--goldL:#d4a84b;--gold-light:#C9A84C;
  --border:#d4c4a8;--border-light:#EDE8E0;--card:#fffdf7;
  --verseBg:#f0e8d8;--verseBd:#c4956a;
  --sbW:96px;--sbBg:#1e1a14;--sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;
}
*{box-sizing:border-box;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  -webkit-user-select:none;-moz-user-select:none;user-select:none;
  font-size:20px;line-height:1.8;}
a{color:inherit;text-decoration:none;}

/* ── 側欄 ── */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;letter-spacing:2px;
  color:var(--gold);text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;transition:color .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;gap:6px;width:100%;align-items:center;margin-top:6px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:3px;
  width:100%;padding:5px 4px;cursor:pointer;border-radius:8px;transition:background .2s;}
.sb-item:hover{background:rgba(184,134,11,.14);}
.sb-circle{width:34px;height:34px;border-radius:50%;
  border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;
  font-family:"Noto Sans TC",sans-serif;font-size:15px;font-weight:600;color:var(--goldL);}
.sb-label{font-family:"Noto Sans TC",sans-serif;font-size:11.5px;color:var(--sbText);
  text-align:center;letter-spacing:.5px;opacity:.85;line-height:1.3;}
.sb-item.active .sb-circle{background:var(--gold);color:#1e1a14;
  box-shadow:0 0 12px rgba(184,134,11,.7);}
.sb-item.active .sb-label{color:var(--goldL);opacity:1;}

/* ── 主區 ── */
.main{margin-left:var(--sbW);}
.site-hero{position:relative;background:var(--headGrad);color:#fff;
  text-align:center;padding:64px 24px 56px;overflow:hidden;}
.site-hero::before{content:"般若";position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);font-size:300px;color:#fff;opacity:.03;
  font-weight:900;pointer-events:none;white-space:nowrap;}
.hero-meta{position:relative;font-family:"Noto Sans TC",sans-serif;font-size:18px;
  letter-spacing:4px;color:var(--goldL);opacity:.9;margin-bottom:18px;}
.hero-title{position:relative;font-size:56px;font-weight:900;color:var(--goldL);
  letter-spacing:6px;margin:0 0 16px;text-shadow:0 2px 12px rgba(0,0,0,.4);}
.hero-subtitle{position:relative;font-size:20px;color:#e8ddc8;letter-spacing:3px;margin-bottom:12px;}
.hero-range{position:relative;font-family:"Noto Sans TC",sans-serif;font-size:17px;
  color:#cbb88f;letter-spacing:2px;margin-top:10px;
  border-top:1px solid rgba(184,134,11,.35);display:inline-block;padding-top:14px;}

/* ── 編者前言 ── */
.preface{max-width:860px;margin:48px auto 12px;padding:0 28px;}
.preface-title{text-align:center;font-size:30px;color:var(--accent);
  letter-spacing:4px;margin:0 0 24px;font-weight:700;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);margin:0 0 16px;text-align:justify;}

/* ── 總目錄 ── */
.toc-section{max-width:1100px;margin:40px auto 24px;padding:0 28px;}
.toc-title{text-align:center;font-size:34px;color:var(--accent);letter-spacing:8px;margin:0 0 10px;font-weight:700;}
.toc-desc{text-align:center;font-family:"Noto Sans TC",sans-serif;font-size:17px;
  color:var(--text-muted);letter-spacing:2px;margin-bottom:30px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;}
.toc-card{display:flex;gap:16px;align-items:flex-start;background:var(--card);
  border:1px solid var(--border);border-left:4px solid var(--gold);border-radius:10px;
  padding:18px 20px;cursor:pointer;transition:transform .2s,box-shadow .2s;}
.toc-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(91,58,41,.14);}
.toc-num{flex:none;width:42px;height:42px;border-radius:50%;background:var(--gold);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:"Noto Sans TC",sans-serif;font-size:17px;font-weight:700;}
.toc-info{flex:1;}
.toc-name{font-size:19.5px;color:var(--accent);font-weight:700;line-height:1.7;margin-bottom:4px;}
.toc-sub{font-family:"Noto Sans TC",sans-serif;font-size:14.5px;color:var(--text-muted);line-height:1.5;}

/* ── 章節（品） ── */
.chapter{margin:30px 0;scroll-margin-top:20px;}
.ch-head{background:var(--headGrad);color:#fff;text-align:center;
  padding:40px 24px 34px;position:relative;}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:18px;letter-spacing:3px;
  color:var(--goldL);opacity:.9;margin-bottom:12px;}
.ch-name{font-size:34px;font-weight:900;color:var(--goldL);letter-spacing:3px;margin:0;
  text-shadow:0 2px 10px rgba(0,0,0,.35);}
.ch-sub{font-family:"Noto Sans TC",sans-serif;font-size:17px;color:#d8c8a4;
  letter-spacing:2px;margin-top:12px;}
.ch-head::after{content:"";display:block;width:80px;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:18px auto 0;}
.ch-body{max-width:980px;margin:0 auto;padding:30px 28px 10px;}

/* ── 橋接 ── */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);border:1px solid var(--border);
  border-left:5px solid var(--gold);border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:12.5px;
  background:var(--gold);color:#fff;padding:3px 12px;border-radius:12px;
  letter-spacing:2.2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;text-align:justify;}

/* ── iframe ── */
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;
  border:1px solid var(--border);border-radius:12px;
  box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:180px;}

.next-link{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:17px;
  color:var(--accent);border:1px solid var(--gold);border-radius:24px;
  padding:9px 22px;margin:8px 0 4px;transition:background .2s,color .2s;cursor:pointer;}
.next-link:hover{background:var(--gold);color:#fff;}

/* ── 底部進度膠囊 ── */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);font-family:"Noto Sans TC",sans-serif;
  font-size:14px;letter-spacing:2px;display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;backdrop-filter:blur(6px);
  transition:opacity .45s ease,transform .45s ease;}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:12px;opacity:.85;letter-spacing:4px;color:var(--goldL);}

/* ── 回頂 ── */
#backTop{position:fixed;right:22px;bottom:22px;width:44px;height:44px;border-radius:50%;
  background:var(--accent);color:#fff;border:0;font-size:20px;cursor:pointer;z-index:120;
  display:none;box-shadow:0 4px 14px rgba(0,0,0,.25);transition:background .2s;}
#backTop:hover{background:var(--gold);}

/* ── 頁尾 ── */
.site-footer{text-align:center;padding:40px 24px 90px;color:var(--text-muted);
  font-family:"Noto Sans TC",sans-serif;font-size:15px;letter-spacing:2px;
  border-top:1px solid var(--border);margin-top:40px;}

#sbToggle{display:none;position:fixed;left:14px;top:14px;z-index:130;
  background:var(--sbBg);color:var(--goldL);border:0;border-radius:8px;
  width:42px;height:42px;font-size:20px;cursor:pointer;}

/* ── RWD ── */
@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  .main{margin-left:0;}
  #sbToggle{display:block;}
  .hero-title{font-size:40px;} .ch-name{font-size:26px;}
  .ch-body{padding:24px 16px 10px;} .toc-section,.preface{padding:0 16px;}
}
@media(max-width:600px){
  body{font-size:17px;} .hero-title{font-size:32px;}
}

.sb-cross::before{content:"";position:absolute;top:0;left:14%;right:14%;

.sb-x{display:flex;flex-direction:column;align-items:center;gap:3px;
  text-decoration:none;color:var(--sbText,#d4c4a8);padding:4px 4px;width:100%;

.sb-x:hover{background:rgba(184,134,11,.14);transform:translateY(-1px);}
.sb-x-glyph{width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:1.2px solid rgba(212,196,168,.55);

  background:rgba(184,134,11,.08);transition:all .25s;}
.sb-x:hover .sb-x-glyph{border-color:var(--gold,#b8860b);color:#fff;
  background:linear-gradient(135deg,var(--gold,#b8860b),var(--goldL,#d4a84b));
  box-shadow:0 0 10px rgba(184,134,11,.5);}
.sb-x-label{font-family:"Noto Sans TC",sans-serif;font-size:10.5px;
  letter-spacing:1.2px;color:var(--sbText,#d4c4a8);opacity:.78;text-align:center;
  line-height:1.25;}
.sb-x:hover .sb-x-label{color:var(--goldL,#d4a84b);opacity:1;}
.sb-x-hub .sb-x-glyph{background:linear-gradient(135deg,
  rgba(184,134,11,.22),rgba(212,168,75,.18));
  border-color:rgba(212,168,75,.55);color:var(--goldL,#d4a84b);font-size:13px;
  font-weight:700;letter-spacing:1px;}

    願以此功德，普及於一切；<br/>我等與眾生，皆共成佛道。
  </div>
</div>
<button id="backTop">↑</button>
<script>
/* ── 側欄高亮 ── */
var sbItems=[].slice.call(document.querySelectorAll('.sb-item'));
function highlight(){
  var best=null,bestTop=-1e9;
  document.querySelectorAll('.chapter').forEach(function(c){
    var t=c.getBoundingClientRect().top;
    if(t<window.innerHeight*0.35 && t>bestTop){bestTop=t;best=c;}
  });
  sbItems.forEach(function(it){it.classList.remove('active');});
  if(best){
    var id=best.id.replace('ch-','');
    var act=document.querySelector('.sb-item[data-ch="'+id+'"]');
    if(act){act.classList.add('active');
      var sb=document.getElementById('sb');
      var r=act.getBoundingClientRect();
      if(r.top<80||r.bottom>window.innerHeight-40){
        sb.scrollTo({top:act.offsetTop-sb.clientHeight/2,behavior:'smooth'});}
    }
  }
}
/* ── 進度 ── */
var rpFill=document.getElementById('rpFill'),rpPct=document.getElementById('rpPct');
function updateProgress(){
  var sh=document.documentElement.scrollHeight-window.innerHeight;
  var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
  if(rpFill)rpFill.style.width=pct+'%';
  if(rpPct)rpPct.textContent=Math.round(pct)+'%';
}
/* ── 回頂 ── */
var backTop=document.getElementById('backTop');
window.addEventListener('scroll',function(){
  highlight();updateProgress();
  if(backTop)backTop.style.display=window.scrollY>600?'block':'none';
},{passive:true});
if(backTop)backTop.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});
/* ── 側欄 / TOC 點擊 ── */
function gotoChapter(id){
  var el=document.getElementById('ch-'+id);if(!el)return;
  resizeAllFrames();
  setTimeout(function(){
    resizeAllFrames();
    var rect=el.getBoundingClientRect();
    window.scrollTo({top:window.scrollY+rect.top-10,behavior:'smooth'});
  },60);
}
document.querySelectorAll('[data-ch]').forEach(function(el){
  el.addEventListener('click',function(){gotoChapter(el.getAttribute('data-ch'));});
});
document.querySelectorAll('.next-link[data-go]').forEach(function(el){
  el.addEventListener('click',function(){gotoChapter(el.getAttribute('data-go'));});
});
/* ── sb-brand 回頂 ── */
var sbBrand=document.getElementById('sbBrand');
if(sbBrand)sbBrand.addEventListener('click',function(e){e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});});
/* ── 漢堡 ── */
var sbToggle=document.getElementById('sbToggle');
if(sbToggle)sbToggle.addEventListener('click',function(){document.getElementById('sb').classList.toggle('open');});
/* ── iframe 自動高度（只量 body.scrollHeight，解耦 viewport） ── */
function resizeFrame(f){
  try{
    var d=f.contentDocument||f.contentWindow.document;
    if(!d||!d.body)return;
    d.body.style.minHeight='0';d.body.style.height='auto';
    if(d.documentElement){d.documentElement.style.minHeight='0';d.documentElement.style.height='auto';}
    var h=d.body.scrollHeight;
    if(h>100){f.style.height=h+'px';f.style.minHeight='0';}
  }catch(e){}
}
function resizeAllFrames(){
  document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function')updateProgress();
}
function setupFrame(f){
  var tries=0;
  function tick(){tries++;resizeFrame(f);if(tries<30)setTimeout(tick,200);}
  if(f.contentDocument&&f.contentDocument.readyState==='complete')tick();
  else f.addEventListener('load',tick);
}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;window.addEventListener('resize',function(){clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);});
var _rt=0,_riv=setInterval(function(){_rt++;resizeAllFrames();if(_rt>50)clearInterval(_riv);},300);
/* ── 接近頁尾淡出 ── */
(function(){
  var cap=document.getElementById('readProgress');if(!cap)return;
  function setHide(on){cap.classList.toggle('hide-near-end',!!on);}
  var targets=[];
  var n1=document.querySelector('[data-wy-notice="v2"]');if(n1)targets.push(n1);
  var f2=document.querySelector('.site-footer');if(f2)targets.push(f2);
  if(!targets.length)return;
  if('IntersectionObserver' in window){
    var io=new IntersectionObserver(function(es){setHide(es.some(function(e){return e.isIntersecting;}));},
      {root:null,rootMargin:'0px 0px -20px 0px',threshold:0.01});
    targets.forEach(function(t){io.observe(t);});
  }else{
    window.addEventListener('scroll',function(){
      setHide(document.documentElement.scrollHeight-(window.scrollY+window.innerHeight)<240);
    },{passive:true});
  }
})();
/* ── 外層防複製 ── */
(function(){
  var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev,blk,true);});
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X'))blk(e);
    if(k==='F12')blk(e);
    if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K'))blk(e);
  },true);
})();
highlight();updateProgress();
</script>

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-64-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
